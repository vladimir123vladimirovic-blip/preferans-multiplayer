<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferans Online</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
    
    /* LOGIN */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    input, button { padding: 10px; margin: 5px; font-size: 16px; border-radius: 5px; border: none; }
    button { cursor: pointer; background-color: #27ae60; color: white; font-weight: bold; }
    button:hover { background-color: #2ecc71; }
    button:disabled { background-color: #95a5a6; cursor: not-allowed; }

    /* GAME BOARD */
    #game-screen { display: none; width: 100%; max-width: 1000px; height: 100vh; flex-direction: column; }
    
    .top-bar { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.3); }
    .score-box { font-size: 14px; }
    
    .table-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background-color: #1a5c2a; border: 10px solid #4a3b2a; border-radius: 20px; margin: 10px; }
    
    /* PLAYERS */
    .player { position: absolute; display: flex; flex-direction: column; align-items: center; width: 150px; }
    .player-top { top: 20px; }
    .player-left { left: 20px; top: 40%; transform: translateY(-50%); }
    .player-right { right: 20px; top: 40%; transform: translateY(-50%); }
    .player-bottom { bottom: 20px; width: 100%; }
    
    .player-name { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; margin-bottom: 5px; font-weight: bold; }
    .dealer-badge { background: gold; color: black; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; margin-left: 5px; }
    
    /* CARDS */
    .hand { display: flex; gap: -20px; }
    .card { width: 50px; height: 75px; background: white; color: black; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); position: relative; transition: transform 0.2s; }
    .card.red { color: red; }
    .card:hover { transform: translateY(-10px); }
    .card.selected { border: 2px solid yellow; transform: translateY(-15px); }
    .card-back { background: #b71c1c; border: 2px solid white; color: transparent; cursor: default; }
    .card-back:hover { transform: none; }

    /* CENTER TRICKS */
    .trick-area { display: flex; gap: 10px; }
    .played-card { position: relative; }
    .played-card.top { margin-bottom: 10px; }
    .played-card.bottom { margin-top: 10px; }

    /* INFO CENTER */
    .center-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; }
    .contract-display { font-size: 18px; font-weight: bold; color: #f1c40f; }
    .refa-display { color: #e74c3c; font-weight: bold; }
    
    /* CONTROLS */
    .controls { position: absolute; bottom: 120px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; display: none; flex-wrap: wrap; justify-content: center; gap: 5px; }
    .bid-btn { width: 40px; height: 40px; margin: 2px; }
    .bid-btn.special { width: auto; padding: 0 10px; }

    /* CHAT */
    .chat-box { position: absolute; right: 10px; top: 10px; width: 200px; background: rgba(0,0,0,0.5); border-radius: 5px; display: flex; flex-direction: column; height: 150px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 5px; font-size: 12px; }
    .chat-input { display: flex; }
    .chat-input input { flex: 1; }

  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <h1>Preferans Multiplayer</h1>
    <input type="text" id="username" placeholder="Tvoje ime">
    <button onclick="joinGame()">Uđi u igru</button>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div class="top-bar">
      <div class="score-box" id="score-display">Bodovi: 0</div>
      <div class="score-box" id="status-display">Čekanje...</div>
      <button onclick="location.reload()">Izlaz</button>
    </div>

    <div class="table-area">
      <!-- Info u centru -->
      <div class="center-info">
        <div id="contract-info" class="contract-display">--</div>
        <div id="refa-info" class="refa-display"></div>
      </div>

      <!-- Igrač 1 (Gore) -->
      <div class="player player-top" id="p1">
        <div class="player-name">Igrač 1</div>
        <div class="hand" id="hand-1"></div>
      </div>

      <!-- Igrač 2 (Levo) -->
      <div class="player player-left" id="p2">
        <div class="player-name">Igrač 2</div>
        <div class="hand" id="hand-2"></div>
      </div>

      <!-- Igrač 3 (Desno) -->
      <div class="player player-right" id="p3">
        <div class="player-name">Igrač 3</div>
        <div class="hand" id="hand-3"></div>
      </div>

      <!-- JA (Dole) -->
      <div class="player player-bottom" id="p0">
        <div class="hand" id="my-hand"></div>
        <div class="player-name">JA <span id="my-score"></span></div>
      </div>

      <!-- Kontrole za licitaciju -->
      <div class="controls" id="bidding-controls">
        <button class="bid-btn" onclick="bid(2, 'S')">2♠</button>
        <button class="bid-btn" onclick="bid(3, 'D')">3♦</button>
        <button class="bid-btn" onclick="bid(4, 'H')">4♥</button>
        <button class="bid-btn" onclick="bid(5, 'C')">5♣</button>
        <button class="bid-btn special" onclick="bid(6, 'NT')">BETL</button>
        <button class="bid-btn special" onclick="bid(7, 'NT')">SANS</button>
        <button class="bid-btn special" onclick="bid(8, 'NT')">PREF</button>
        <hr style="width:100%; border-color:white;">
        <button class="bid-btn special" style="background:orange" onclick="bidIGRA()">IGRA (+2)</button>
        <button class="bid-btn special" style="background:red" onclick="passBid()">DALJE</button>
      </div>

      <!-- Chat -->
      <div class="chat-box">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Poruka...">
          <button onclick="sendChat()">></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    let myId = null;
    let myIndex = -1;
    let currentGame = null;

    // Pomoćne funkcije za karte
    const SUIT_ICONS = { 'S': '♠', 'H': '♥', 'D': '♦', 'C': '♣' };
    const SUIT_COLOR = { 'S': 'black', 'H': 'red', 'D': 'red', 'C': 'black' };

    function joinGame() {
      const name = document.getElementById('username').value;
      if (!name) return alert('Unesi ime!');
      
      socket.emit('user:join', { username: name, displayName: name });
      
      // Auto-join prve partije ili create
      socket.emit('game:create', { name: 'Sto 1', maxRefas: 2, numHands: 3 });
    }

    socket.on('user:joined', (data) => {
      myId = data.socketId || socket.id; // fallback
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
    });

    socket.on('game:created', ({ gameId, game }) => {
      currentGame = game;
      renderGame();
    });

    socket.on('game:update', ({ game }) => {
      currentGame = game;
      // Pronađi moj index
      if (currentGame.players) {
        const me = currentGame.players.find(p => p.socketId === socket.id);
        if (me) {
          myIndex = currentGame.players.indexOf(me);
        }
      }
      renderGame();
    });

    function renderGame() {
      if (!currentGame || !currentGame.players) return;

      // 1. Postavi imena i uloge
      currentGame.players.forEach((p, idx) => {
        const el = document.getElementById(`p${idx}`);
        if(el) {
          let html = `<div class="player-name">${p.displayName}`;
          if (idx === currentGame.dealerIndex) html += `<span class="dealer-badge">D</span>`;
          html += `</div>`;
          el.innerHTML = html + `<div class="hand" id="hand-${idx}"></div>`;
        }
      });

      // 2. Prikaži bodove i status
      const myPlayer = currentGame.players[myIndex];
      if (myPlayer) {
        document.getElementById('my-score').textContent = `(${currentGame.scores[myPlayer.username] || 0})`;
      }

      // 3. Prikaz ugovora i refe
      let contractText = "--";
      if (currentGame.phase === 'playing' && currentGame.contract) {
        const c = currentGame.contract;
        let type = "";
        if (c.level === 6) type = "BETL";
        else if (c.level === 7) type = "SANS";
        else if (c.level === 8) type = "PREFERANS";
        else type = c.level + SUIT_ICONS[c.suit];
        
        if (c.isIgra) type += " (IGRA +2)";
        contractText = type;
      }
      document.getElementById('contract-info').textContent = contractText;

      let refaText = "";
      if (currentGame.refaCount > 0) {
        refaText = `REF x${Math.pow(2, currentGame.refaCount)}`;
      }
      document.getElementById('refa-info').textContent = refaText;

      // 4. Renderovanje karata
      // Moja ruka
      const myHandEl = document.getElementById('my-hand');
      myHandEl.innerHTML = '';
      if (myIndex !== -1 && currentGame.hands) {
        currentGame.hands[myIndex].forEach(card => {
          const cardEl = document.createElement('div');
          cardEl.className = `card ${SUIT_COLOR[card.suit]}`;
          cardEl.innerHTML = `${card.value}<br>${SUIT_ICONS[card.suit]}`;
          cardEl.onclick = () => playCard(card.suit, card.value);
          myHandEl.appendChild(cardEl);
        });
      }

      // Ruke protivnika (samo broj karata - leđa)
      for (let i = 0; i < 3; i++) {
        if (i === myIndex) continue;
        const handEl = document.getElementById(`hand-${i}`);
        if (handEl && currentGame.hands && currentGame.hands[i]) {
          handEl.innerHTML = '';
          const count = currentGame.hands[i].length;
          for (let k = 0; k < count; k++) {
            const back = document.createElement('div');
            back.className = 'card card-back';
            back.style.marginRight = '-30px'; // Preklapanje
            handEl.appendChild(back);
          }
        }
      }

      // 5. Prikaz odigranih karata na stolu (trick)
      // Ovo bi išlo u centar, ali radi jednostavnosti samo ažuriramo status
      // Za punu vizuelizaciju štiha treba dodati elemente u .trick-area
      
      // 6. Kontrole
      const controls = document.getElementById('bidding-controls');
      controls.style.display = 'none';

      if (currentGame.phase === 'bidding') {
        if (currentGame.currentBidder === myIndex) {
          controls.style.display = 'flex';
          document.getElementById('status-display').textContent = "Tvoja licitacija!";
        } else {
          document.getElementById('status-display').textContent = "Čeka se licitacija...";
        }
      } else if (currentGame.phase === 'playing') {
        if (currentGame.currentTurn === myIndex) {
          document.getElementById('status-display').textContent = "Tvoj potez! Klikni na kartu.";
        } else {
          document.getElementById('status-display').textContent = "Čekanje protivnika...";
        }
      }
    }

    function bid(level, suit) {
      socket.emit('game:bid', { gameId: currentGame.id, level, suit, isIgra: false });
    }

    function bidIGRA() {
      // IGRA podrazumeva prihvatanje trenutne najbolje ponude ali bez talona
      // Ako nema ponude, server bi trebao da handle-uje default ili grešku
      // Šaljo level/suit trenutnog highestBid-a sa flagom isIgra
      let l = 2, s = 'S'; // Default ako nema bid-a
      if (currentGame.highestBid) {
        l = currentGame.highestBid.level;
        s = currentGame.highestBid.suit;
      }
      socket.emit('game:bid', { gameId: currentGame.id, level: l, suit: s, isIgra: true });
    }

    function passBid() {
      // Slanje praznog bida znači "Dalje"
      socket.emit('game:bid', { gameId: currentGame.id, level: null, suit: null });
    }

    function playCard(suit, value) {
      socket.emit('game:play', { gameId: currentGame.id, suit, value });
    }

    // Chat
    function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value;
      if (!text) return;
      socket.emit('chat:send', { gameId: currentGame.id, text });
      input.value = '';
    }

    socket.on('chat:message', (msg) => {
      const box = document.getElementById('chat-messages');
      box.innerHTML += `<div><b>${msg.username}:</b> ${msg.text}</div>`;
      box.scrollTop = box.scrollHeight;
    });

    socket.on('error', (err) => alert(err.message));
    socket.on('game:ended', (data) => alert(`Kraj igre! Tvoj skor: ${data.scores}`));

  </script>
</body>
</html>
