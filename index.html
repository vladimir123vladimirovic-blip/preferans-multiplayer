<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferans - Vladimir</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    /* OSNOVNI STIL */
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #1a472a; /* TAmno zelena pozadina stola */
      color: white;
      margin: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* LOGIN */
    #login-screen {
      position: absolute;
      z-index: 100;
      background: #0f2b18;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid gold;
    }
    input { padding: 10px; font-size: 18px; width: 200px; margin-bottom: 10px; }
    button.main-btn { padding: 10px 20px; font-size: 18px; background: gold; border: none; cursor: pointer; font-weight: bold; }

    /* STO I GRÁFICA */
    #game-screen { display: none; width: 100%; height: 100%; position: relative; }

    /* IGRAČI (POZICIJE) */
    .player-slot { position: absolute; display: flex; flex-direction: column; align-items: center; transition: all 0.3s; }
    
    /* Ime igrača i žuti krug kada je na redu */
    .player-name {
      background: rgba(0,0,0,0.6);
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 16px;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    
    /* ŽUTA BOJA ZA AKTIVNOG IGRAČA */
    .player-active .player-name {
      border-color: yellow;
      box-shadow: 0 0 15px yellow;
      color: yellow;
    }

    /* KARTE - POVEĆANE 2.5X */
    .hand { display: flex; justify-content: center; gap: -10px; margin-top: 5px; }
    .card {
      width: 130px;  /* Povećano */
      height: 190px; /* Povećano */
      background: white;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 45px; /* Veliki font */
      font-weight: bold;
      cursor: pointer;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
      border: 2px solid #ccc;
      user-select: none;
      position: relative;
    }
    .card.red { color: #d32f2f; }
    .card.black { color: #212121; }
    .card:hover { transform: translateY(-20px); z-index: 10; }
    .card-back { background: repeating-linear-gradient(45deg, #1565c0, #1565c0 10px, #1976d2 10px, #1976d2 20px); border: 4px solid white; }
    .card-back:hover { transform: none; }

    /* PANC ZA INFORMACIJE (DESNO SREDINA) */
    .info-panel-right {
      position: absolute;
      right: 20px;
      top: 40%;
      transform: translateY(-50%);
      width: 250px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* PROZOR LICITACIJE (LOG) */
    .log-window {
      background: rgba(255, 255, 255, 0.9);
      color: black;
      padding: 10px;
      border-radius: 8px;
      height: 250px;
      overflow-y: auto;
      font-size: 14px;
      border: 2px solid #555;
    }
    .log-entry { border-bottom: 1px solid #ccc; padding: 2px 0; }
    .log-dealer { font-weight: bold; color: blue; }
    .log-bid { color: green; }
    .log-contract { font-weight: bold; color: red; font-size: 16px; text-align: center; margin-top: 10px; }

    /* IKONICE (DESNO IZNAD LOGA) */
    .game-icons { display: flex; gap: 10px; justify-content: center; }
    .icon-box {
      width: 60px; height: 60px;
      background: rgba(0,0,0,0.5);
      border: 2px solid white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; text-align: center; cursor: pointer;
    }
    .icon-box:hover { background: rgba(255,255,255,0.2); }

    /* TABELA SKOROVA (DOLE LEVO) */
    .score-panel {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 300px;
      background: #d3d3d3; /* Siva pozadina */
      padding: 10px;
      border-radius: 5px;
      color: black; /* Crni brojevi */
    }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    th { background: #999; padding: 5px; border: 1px solid black; }
    td { padding: 5px; border: 1px solid black; font-weight: bold; }

    /* DUGMAD ZA LICITACIJU (SREDINA DOLE - VERTIKALNO) */
    .bidding-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none; /* Sakriveno dok nije tvoj red */
      flex-direction: column; /* Jedno ispod drugog */
      gap: 10px;
      z-index: 50;
    }
    .bid-btn {
      width: 200px;
      height: 50px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #2196F3;
      color: white;
      box-shadow: 2px 2px 5px black;
    }
    .bid-btn.igra { background: #ff9800; } /* IGRA narandžasta */
    .bid-btn.pass { background: #f44336; }
    .bid-btn.special { background: #4CAF50; }
    .bid-btn:hover { opacity: 0.9; }

    /* CHAT (GORE DESNO - MALI) */
    .chat-mini {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 200px;
      height: 100px;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 12px;
      padding: 5px;
      border-radius: 5px;
      overflow-y: auto;
    }

  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <h1>Preferans</h1>
    <input type="text" id="username" placeholder="Tvoje Ime">
    <button class="main-btn" onclick="joinGame()">UĐI</button>
  </div>

  <!-- IGRA -->
  <div id="game-screen">
    
    <!-- LEVO DOLE: TABELA SKOROVA -->
    <div class="score-panel">
      <h3 style="margin:0 0 5px 0; text-align:center;">Rezultati</h3>
      <table id="score-table">
        <tr><th>Igrač</th><th>Bodovi</th></tr>
        <!-- Popunjava se dinamički -->
      </table>
    </div>

    <!-- DESNO SREDINA: INFO PANEL -->
    <div class="info-panel-right">
      <!-- IKONICE -->
      <div class="game-icons">
        <div class="icon-box" onclick="alert('Nema Pad')">NEMA<br>PAD</div>
        <div class="icon-box" onclick="alert('Preuzimam')">PREUZIMAM<br>PAD</div>
        <div class="icon-box" onclick="alert('Sve Moje')">SVE<br>MOJE</div>
      </div>

      <!-- LOG LICITACIJE -->
      <div class="log-window" id="bid-log">
        <div class="log-entry">Čekanje na igrače...</div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat-mini" id="chat-box"></div>

    <!-- STOLICA 1 (Levo Gore) -->
    <div class="player-slot" id="p1" style="top: 50px; left: 15%;">
      <div class="player-name" id="name-1">Čeka se...</div>
      <div class="hand" id="hand-1"></div>
    </div>

    <!-- STOLICA 2 (Desno Gore) -->
    <div class="player-slot" id="p2" style="top: 50px; right: 15%;">
      <div class="player-name" id="name-2">Čeka se...</div>
      <div class="hand" id="hand-2"></div>
    </div>

    <!-- STOLICA JA (Dole) -->
    <div class="player-slot" id="p0" style="bottom: 220px;">
      <div class="hand" id="hand-me"></div>
      <div class="player-name" id="name-me">TI</div>
    </div>

    <!-- DUGMAD LICITACIJE (VERTIKALNO) -->
    <div class="bidding-controls" id="bidding-controls">
      <button class="bid-btn igra" onclick="bidIGRA()">IGRA (+2)</button>
      <button class="bid-btn" onclick="bid(2, 'S')">2 ♠ (Pik)</button>
      <button class="bid-btn" onclick="bid(3, 'D')">3 ♦ (Karo)</button>
      <button class="bid-btn" onclick="bid(4, 'H')">4 ♥ (Herc)</button>
      <button class="bid-btn" onclick="bid(5, 'C')">5 ♣ (Tref)</button>
      <button class="bid-btn special" onclick="bid(6, 'NT')">BETL (6)</button>
      <button class="bid-btn special" onclick="bid(7, 'NT')">SANS (7)</button>
      <button class="bid-btn special" onclick="bid(8, 'NT')">PREFERANS (8)</button>
      <button class="bid-btn pass" onclick="passBid()">DALJE</button>
    </div>

  </div>

  <script>
    const socket = io();
    let myId = null;
    let myIndex = -1;
    let currentGame = null;

    const SUITS = { 'S': '♠', 'H': '♥', 'D': '♦', 'C': '♣' };

    function joinGame() {
      const name = document.getElementById('username').value;
      if(!name) return alert("Unesi ime!");
      socket.emit('user:join', { username: name, displayName: name });
      setTimeout(() => socket.emit('game:create', { name: 'Sto', maxRefas: 2, numHands: 5 }), 500);
    }

    socket.on('user:joined', () => {
      myId = socket.id;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';
    });

    socket.on('game:update', ({ game }) => {
      currentGame = game;
      if(game.players) {
        const me = game.players.find(p => p.socketId === myId);
        if(me) myIndex = game.players.indexOf(me);
      }
      renderGame();
    });

    function renderGame() {
      if(!currentGame || !currentGame.players) return;

      // 1. Reset
      document.querySelectorAll('.player-slot').forEach(el => {
        el.className = 'player-slot'; // Remove active class
        el.querySelector('.hand').innerHTML = '';
      });
      document.getElementById('bidding-controls').style.display = 'none';

      // 2. Prikaz protivnika (Top 1 i Top 2)
      // Protivnik 1 (levo)
      if(currentGame.players[1]) renderOpponent(1, 'p1', 'name-1', 'hand-1');
      // Protivnik 2 (desno)
      if(currentGame.players[2]) renderOpponent(2, 'p2', 'name-2', 'hand-2');

      // 3. Prikaz MENE (Dole)
      if(myIndex !== -1 && currentGame.players[myIndex]) {
        renderMyHand(myIndex, 'p0', 'name-me', 'hand-me');
      }

      // 4. Highlight aktivnog igrača (Žuta boja)
      let activeIdx = -1;
      if(currentGame.phase === 'bidding') activeIdx = currentGame.currentBidder;
      else if(currentGame.phase === 'playing') activeIdx = currentGame.currentTurn;
      
      if(activeIdx !== -1) {
        let slotId = activeIdx === 0 ? 'p0' : (activeIdx === 1 ? 'p1' : 'p2');
        document.getElementById(slotId).classList.add('player-active');
      }

      // 5. Ažuriraj Log (Desno)
      updateLog();
      
      // 6. Ažuriraj Tabelu (Levo)
      updateScoreTable();
    }

    function renderOpponent(idx, slotId, nameId, handId) {
      const p = currentGame.players[idx];
      document.getElementById(nameId).innerText = p.displayName + (currentGame.dealerIndex === idx ? ' (D)' : '');
      const handEl = document.getElementById(handId);
      // Leđa karata
      if(currentGame.hands && currentGame.hands[idx]) {
        const count = currentGame.hands[idx].length;
        for(let i=0; i<count; i++) {
          const c = document.createElement('div');
          c.className = 'card card-back';
          c.style.marginLeft = '-80px'; // Preklapanje velikih karata
          handEl.appendChild(c);
        }
      }
    }

    function renderMyHand(idx, slotId, nameId, handId) {
      const p = currentGame.players[idx];
      document.getElementById(nameId).innerText = p.displayName + " (TI)" + (currentGame.dealerIndex === idx ? ' (D)' : '');
      const handEl = document.getElementById(handId);
      handEl.innerHTML = ''; // Clear
      
      if(currentGame.hands && currentGame.hands[idx]) {
        currentGame.hands[idx].forEach(card => {
          const c = document.createElement('div');
          const color = (card.suit === 'H' || card.suit === 'D') ? 'red' : 'black';
          c.className = `card ${color}`;
          c.innerHTML = `<div style="font-size:30px">${card.value}</div><div style="font-size:60px">${SUITS[card.suit]}</div>`;
          c.onclick = () => playCard(card.suit, card.value);
          handEl.appendChild(c);
        });
      }

      // Prikaz kontrole
      if(currentGame.phase === 'bidding' && currentGame.currentBidder === idx) {
        document.getElementById('bidding-controls').style.display = 'flex';
      }
    }

    function updateLog() {
      const logEl = document.getElementById('bid-log');
      let html = '';
      
      // Ko deli
      if(currentGame.players[currentGame.dealerIndex]) {
        html += `<div class="log-entry log-dealer">Deli: ${currentGame.players[currentGame.dealerIndex].displayName}</div>`;
      }

      // Istorija
      if(currentGame.bidHistory) {
        currentGame.bidHistory.forEach(b => {
          const pName = currentGame.players[b.player] ? currentGame.players[b.player].displayName : '?';
          let txt = b.isIgra ? "IGRA" : (b.level ? `${b.level} ${SUITS[b.suit] || ''}` : "Dalje");
          html += `<div class="log-entry log-bid">${pName}: ${txt}</div>`;
        });
      }

      // Ugovor
      if(currentGame.phase === 'playing' && currentGame.contract) {
        const c = currentGame.contract;
        let txt = "";
        if(c.level === 6) txt = "BETL";
        else if(c.level === 7) txt = "SANS";
        else if(c.level === 8) txt = "PREFERANS";
        else txt = `${c.level} ${SUITS[c.suit]}`;
        if(c.isIgra) txt += " (IGRA)";
        
        html += `<div class="log-contract">UGOVOR: ${txt}</div>`;
        if(currentGame.refaCount > 0) html += `<div style="color:red; text-align:center;">REF x${Math.pow(2, currentGame.refaCount)}</div>`;
      }

      logEl.innerHTML = html;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function updateScoreTable() {
      const table = document.getElementById('score-table');
      let html = '<tr><th>Igrač</th><th>Bodovi</th></tr>';
      currentGame.players.forEach(p => {
        const score = currentGame.scores[p.username] || 0;
        html += `<tr><td>${p.displayName}</td><td>${score}</td></tr>`;
      });
      table.innerHTML = html;
    }

    // --- AKCIJE ---
    function bid(level, suit) {
      socket.emit('game:bid', { gameId: currentGame.id, level, suit, isIgra: false });
    }
    function bidIGRA() {
      // Logika za IGRA: uzima trenutni highestBid ili default
      let l = 2, s = 'S';
      if(currentGame.highestBid) { l = currentGame.highestBid.level; s = currentGame.highestBid.suit; }
      socket.emit('game:bid', { gameId: currentGame.id, level: l, suit: s, isIgra: true });
    }
    function passBid() {
      socket.emit('game:bid', { gameId: currentGame.id, level: null, suit: null });
    }
    function playCard(suit, value) {
      socket.emit('game:play', { gameId: currentGame.id, suit, value });
    }

  </script>
</body>
</html>
