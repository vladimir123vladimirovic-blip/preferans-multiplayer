<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preferans Multiplayer</title>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--gold:#d4a843;--text:#e0e0e0;--muted:#8899aa;--red:#e74c3c;--green:#27ae60}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#auth{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0d2818,#1a1a2e)}
.auth-box{background:var(--card);padding:40px;border-radius:12px;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.auth-box h1{text-align:center;color:var(--gold);margin-bottom:20px}
input,select{width:100%;padding:12px;margin:8px 0 18px;border:1px solid #0f3460;border-radius:8px;background:#0f3460;color:var(--text);font-size:1em}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--gold),#f0d078);color:#0d2818;font-weight:600;cursor:pointer;font-size:1em}
button:hover{opacity:.9}
.btn-small{padding:6px 12px;font-size:.85em;width:auto}
#app{display:none}
nav{background:#0d2818;padding:0 20px;display:flex;justify-content:space-between;align-items:center;height:60px;border-bottom:2px solid var(--gold)}
nav .logo{color:var(--gold);font-size:1.4em;font-weight:bold;cursor:pointer}
.page{display:none;padding:20px;max-width:1200px;margin:0 auto}
.page.active{display:block}
.card-box{background:var(--card);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,.05)}
.game-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:15px;margin-bottom:10px}
.game-item-header{display:flex;justify-content:space-between;margin-bottom:8px}
.game-details{display:flex;gap:15px;font-size:.85em;color:var(--muted)}
.game-players{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.game-player-tag{background:#0f3460;padding:4px 10px;border-radius:15px;font-size:.8em}
.game-actions{display:flex;gap:8px;margin-top:10px}
.table-layout{display:grid;grid-template-columns:200px 1fr 200px;grid-template-rows:1fr auto 1fr;gap:10px;min-height:520px;margin:20px 0}
.zone{display:flex;flex-direction:column;align-items:center;gap:6px}
.zone-top{grid-column:2;grid-row:1}
.zone-left{grid-column:1;grid-row:2}
.zone-right{grid-column:3;grid-row:2}
.zone-bottom{grid-column:2;grid-row:3}
.info-box{background:var(--card);border-radius:10px;padding:8px 14px;text-align:center;border:2px solid rgba(255,255,255,.1);min-width:110px}
.info-box.turn{border-color:var(--gold);box-shadow:0 0 15px rgba(212,168,67,.3)}
.info-box .avatar{width:40px;height:40px;border-radius:50%;background:var(--gold);margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#0d2818;font-size:1.1em}
.info-box .name{font-weight:600;font-size:.85em}
.info-box .score{font-size:.75em;color:var(--gold)}
.hand{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.other-hand{display:flex;gap:3px;justify-content:center}
.other-hand .card-back-small{width:24px;height:36px;background:linear-gradient(135deg,#1a237e,#283593);border:2px solid #5c6bc0;border-radius:4px}
.center-area{grid-column:2;grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:center}
.center-table{width:320px;height:260px;background:radial-gradient(ellipse at center,#2d5a3f 0%,#1a3a28 70%);border-radius:50%;border:6px solid #3d2b1f;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 0 40px rgba(0,0,0,.5)}
.center-cards{display:flex;gap:15px;margin:10px 0}
.center-card-slot{width:70px;height:100px;border:2px dashed rgba(255,255,255,.15);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.center-card-slot .slot-label{position:absolute;top:-18px;font-size:.7em;color:rgba(255,255,255,.5)}
.center-card-slot.filled{border-style:solid;border-color:var(--gold)}
.trick-result{color:var(--gold);font-size:.85em;font-weight:bold;margin-top:5px}
.playing-card{width:52px;height:76px;background:#fff;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;transition:all .2s;user-select:none;position:relative}
.playing-card:hover{transform:translateY(-10px)}
.playing-card.red{color:var(--red)}
.playing-card.black{color:#1a1a2e}
.playing-card .card-value{font-size:14px}
.playing-card .card-suit{font-size:16px}
.playing-card .corner{position:absolute;font-size:8px}
.playing-card .tl{top:3px;left:4px}
.playing-card .br{bottom:3px;right:4px;transform:rotate(180deg)}
.playing-card.disabled{opacity:.4;pointer-events:none}
.bidding-panel{background:var(--card);border-radius:12px;padding:15px;margin-top:10px;border:1px solid rgba(212,168,67,.2)}
.bidding-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
.bidding-grid button{padding:8px;font-size:.8em;background:rgba(0,0,0,.3);color:var(--text);border:2px solid rgba(255,255,255,.2);border-radius:8px;cursor:pointer}
.bidding-grid button:hover{border-color:var(--gold)}
.bidding-history{margin-top:10px;font-size:.8em;color:var(--muted)}
.bidding-history span{display:inline-block;padding:2px 6px;margin:2px;background:rgba(255,255,255,.05);border-radius:4px}
.msg{text-align:center;padding:8px;color:var(--gold);font-weight:600;min-height:24px}
.game-info-bar{display:flex;justify-content:space-between;background:var(--card);padding:10px 20px;border-radius:12px;margin-bottom:15px;border:1px solid rgba(212,168,67,.2)}
.phase-badge{padding:4px 12px;border-radius:20px;font-size:.8em;font-weight:600;background:rgba(52,152,219,.2);color:#3498db}
.phase-badge.bidding{background:rgba(241,196,15,.2);color:#f1c40f}
.phase-badge.playing{background:rgba(155,89,182,.2);color:#9b59b6}
.phase-badge.done{background:rgba(39,174,96,.2);color:var(--green)}
.notification{position:fixed;top:80px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-weight:600;z-index:300;transform:translateX(120%);transition:transform .3s}
.notification.show{transform:translateX(0)}
.notification.success{background:var(--green)}
.notification.error{background:var(--red)}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
@media(max-width:900px){.table-layout{grid-template-columns:1fr;grid-template-rows:auto auto auto auto auto}.zone-left,.zone-right{grid-column:1}.zone-top{grid-row:1}.zone-left{grid-row:2}.center-area{grid-row:3}.zone-right{grid-row:4}.zone-bottom{grid-row:5}}
</style>
</head>
<body>
<div id="auth">
  <div class="auth-box">
    <h1>♠ Preferans</h1>
    <input type="text" id="username" placeholder="Tvoje ime">
    <button onclick="joinServer()">Uđi u igru</button>
  </div>
</div>

<div id="app">
  <nav>
    <div class="logo">Preferans Online</div>
    <div id="myName" style="color:var(--gold)"></div>
  </nav>

  <div class="page active" id="lobby">
    <h2 style="color:var(--gold);margin-bottom:15px">Lobby</h2>
    <div class="card-box">
      <div class="card-box" style="margin-bottom:15px">
        <input type="text" id="gameName" placeholder="Naziv partije" style="margin:0">
        <button onclick="createGame()" style="margin-top:10px">➕ Kreiraj partiju</button>
      </div>
      <div id="gameList"></div>
    </div>
  </div>

  <div class="page" id="table">
    <div class="game-info-bar">
      <div><span id="gName">Partija</span> <span class="phase-badge" id="phase">Čekanje</span></div>
      <div id="gInfo">Ruka 1 / 10</div>
    </div>
    <div class="table-layout">
      <div class="zone zone-top"><div class="info-box" id="p2"><div class="avatar" id="a2">?</div><div class="name" id="n2">Čeka se</div><div class="score" id="s2">0</div></div><div class="other-hand" id="h2"></div></div>
      <div class="zone zone-left"><div class="info-box" id="p1"><div class="avatar" id="a1">?</div><div class="name" id="n1">Čeka se</div><div class="score" id="s1">0</div></div><div class="other-hand" id="h1"></div></div>
      <div class="center-area">
        <div class="center-table">
          <div id="contract" style="color:var(--gold);font-weight:bold;margin-bottom:5px"></div>
          <div class="center-cards" id="slots">
            <div class="center-card-slot" id="slot0"><span class="slot-label">P1</span></div>
            <div class="center-card-slot" id="slot1"><span class="slot-label">P2</span></div>
            <div class="center-card-slot" id="slot2"><span class="slot-label">P3</span></div>
          </div>
          <div class="trick-result" id="trickRes"></div>
        </div>
        <div class="msg" id="msg">Čekanje igrača...</div>
      </div>
      <div class="zone zone-right"><div class="info-box" id="p3"><div class="avatar" id="a3">?</div><div class="name" id="n3">Čeka se</div><div class="score" id="s3">0</div></div><div class="other-hand" id="h3"></div></div>
      <div class="zone zone-bottom"><div class="hand" id="myHand"></div><div class="info-box" id="p0" style="margin-top:8px"><div class="avatar" id="a0">Vi</div><div class="name" id="n0">Vi</div><div class="score" id="s0">0</div></div></div>
    </div>
    <div class="bidding-panel" id="bidPanel" style="display:none">
      <div class="bidding-grid" id="bidGrid"></div>
      <button class="btn-small" style="background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid #e74c3c" onclick="sendBid(null,null)">PAS</button>
      <div class="bidding-history" id="bidHist"></div>
    </div>
  </div>
</div>

<div class="notification" id="notif"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myId = null, myName = '', currentGame = null;

function notify(msg, type='info') {
  const el = document.getElementById('notif');
  el.textContent = msg; el.className = 'notification ' + type;
  setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>el.classList.remove('show'),3000);
}

function joinServer() {
  const name = document.getElementById('username').value.trim();
  if (!name) return notify('Unesi ime!','error');
  myName = name;
  socket.emit('user:join', {name});
}

socket.on('user:joined', data => {
  myId = data.id;
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('myName').textContent = myName;
  notify('Povezan si!','success');
});

socket.on('games:list', games => {
  const list = document.getElementById('gameList');
  if (!games.length) { list.innerHTML = '<div class="empty-state">Nema partija. Kreiraj novu!</div>'; return; }
  list.innerHTML = games.map(g => `
    <div class="game-item">
      <div class="game-item-header"><b>${g.name}</b> <span style="font-size:.8em;color:var(--muted)">${g.phase==='bidding'?'Licitacija':g.phase==='playing'?'Igranje':'Završeno'}</span></div>
      <div class="game-details"><span>Igrači: ${g.players.join(', ')}</span></div>
      <div class="game-actions">
        ${g.players.length<3 ? `<button class="btn-small" onclick="joinGame('${g.id}')">Pridruži se</button>` : ''}
        <button class="btn-small" style="background:#0f3460;color:var(--text)" onclick="spectate('${g.id}')">Gledaj</button>
      </div>
    </div>
  `).join('');
});

function createGame() {
  const name = document.getElementById('gameName').value.trim() || 'Nova partija';
  socket.emit('game:create', {name, numHands: 10});
}

function joinGame(id) {
  socket.emit('game:join', id);
}

function spectate(id) {
  socket.emit('game:join', id); // U ovoj verziji gledaoci ulaze kao igrači ako ima mesta. Za čisto gledanje treba dodatna logika.
}

socket.on('game:joined', ({id, game}) => {
  currentGame = game;
  document.getElementById('lobby').classList.remove('active');
  document.getElementById('table').classList.add('active');
  renderGame(game);
});

socket.on('game:update', game => {
  currentGame = game;
  renderGame(game);
});

socket.on('error', msg => notify(msg,'error'));

function renderGame(g) {
  document.getElementById('gName').textContent = g.settings.name || 'Partija';
  document.getElementById('gInfo').textContent = `Ruka ${g.handNumber} / ${g.maxHands}`;
  const phaseEl = document.getElementById('phase');
  phaseEl.textContent = g.phase==='bidding'?'Licitacija':g.phase==='playing'?'Igranje':g.phase==='done'?'Završeno':'Čekanje';
  phaseEl.className = 'phase-badge ' + g.phase;

  for(let i=0;i<3;i++){
    const p = g.players[i];
    document.getElementById('n'+i).textContent = p ? p.name : 'Čeka se';
    document.getElementById('s'+i).textContent = g.scores[p?.name] || 0;
    document.getElementById('a'+i).textContent = p ? p.name.charAt(0) : '?';
    const handEl = document.getElementById('h'+i);
    handEl.innerHTML = p ? Array(g.hands[i].length).fill('<div class="card-back-small"></div>').join('') : '';
  }

  document.getElementById('contract').textContent = g.contract ? `${g.contract.level} ${g.contract.suit}` : '';
  for(let i=0;i<3;i++){
    const slot = document.getElementById('slot'+i);
    const c = g.trickCards[i];
    slot.className = 'center-card-slot' + (c?' filled':'');
    slot.innerHTML = `<span class="slot-label">${g.players[i]?.name||'P'+(i+1)}</span>` + (c ? cardHTML(c) : '');
  }
  document.getElementById('trickRes').textContent = '';

  const myIdx = g.players.findIndex(p=>p.id===myId);
  const myHand = document.getElementById('myHand');
  if(myIdx>=0 && g.hands[myIdx]){
    const isTurn = g.currentTurn===myIdx && g.phase==='playing';
    myHand.innerHTML = g.hands[myIdx].map(c => {
      let dis = (!isTurn) ? 'disabled' : '';
      if(g.phase==='playing' && isTurn && g.trickCards[g.trickStarter]){
        const led = g.trickCards[g.trickStarter].s;
        if(g.hands[myIdx].some(x=>x.s===led) && c.s!==led) dis = 'disabled';
      }
      return `<div class="playing-card ${c.s==='H'||c.s==='D'?'red':'black'} ${dis}" onclick="playCard('${c.s}','${c.v}')"><span class="corner tl">${c.v}${c.s}</span>${c.v}<br>${c.s}<span class="corner br">${c.v}${c.s}</span></div>`;
    }).join('');
  } else myHand.innerHTML = '';

  const bp = document.getElementById('bidPanel');
  bp.style.display = g.phase==='bidding' ? 'block' : 'none';
  if(g.phase==='bidding'){
    const grid = document.getElementById('bidGrid');
    const minVal = g.highestBid ? (g.highestBid.suit==='NT'?g.highestBid.level*10+5:g.highestBid.level*10+{'S':1,'C':2,'D':3,'H':4}[g.highestBid.suit]) : 0;
    let html = '';
    for(let l=1;l<=3;l++) for(let s of ['S','C','D','H','NT']){
      const val = s==='NT'?l*10+5:l*10+{'S':1,'C':2,'D':3,'H':4}[s];
      if(val>minVal) html += `<button onclick="sendBid(${l},'${s}')">${l}${s}</button>`;
    }
    grid.innerHTML = html;
    document.getElementById('bidHist').innerHTML = g.bidHistory.map(b=>`<span>${g.players[b.player]?.name||'?'}: ${b.level?b.level+b.suit:'PAS'}</span>`).join('');
    document.getElementById('msg').textContent = g.currentBidder===myIdx ? '🎯 Tvoj red za licitaciju!' : `${g.players[g.currentBidder]?.name||'?'} licitira...`;
  } else if(g.phase==='playing'){
    document.getElementById('msg').textContent = g.currentTurn===myIdx ? '🃏 Tvoj potez!' : `${g.players[g.currentTurn]?.name||'?'} igra...`;
  } else document.getElementById('msg').textContent = 'Čekanje...';
}

function cardHTML(c){
  return `<div class="playing-card ${c.s==='H'||c.s==='D'?'red':'black'}"><span class="corner tl">${c.v}${c.s}</span>${c.v}<br>${c.s}<span class="corner br">${c.v}${c.s}</span></div>`;
}

function sendBid(l,s){
  if(!currentGame || currentGame.phase!=='bidding') return;
  socket.emit('game:bid', {gameId: currentGame.id, level: l, suit: s});
}

function playCard(s,v){
  if(!currentGame || currentGame.phase!=='playing') return;
  socket.emit('game:play', {gameId: currentGame.id, s, v});
}
</script>
</body>
</html>
